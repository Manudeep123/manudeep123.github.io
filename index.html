<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020107" />
    
    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws:;" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <!-- Primary Meta Tags for Extreme SEO -->
    <title>Manudeep</title>
    <meta name="title" content="Manudeep | Official Website" />
    <meta name="description" content="Manudeep - Official Website. The premier destination for Manudeep." />
    <meta name="keywords" content="Manudeep, manudeep, MANUDEEP" />
    <meta name="author" content="Manudeep" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://manudeep.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://manudeep.com/" />
    <meta property="og:title" content="Manudeep | Creative Software Engineer" />
    <meta property="og:description" content="Welcome to the mind-blowing 3D portfolio of Manudeep. Explore a cinematic digital universe crafted with Three.js." />
    <meta property="og:image" content="https://manudeep.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://manudeep.com/" />
    <meta property="twitter:title" content="Manudeep | Creative Software Engineer" />
    <meta property="twitter:description" content="Welcome to the mind-blowing 3D portfolio of Manudeep. Explore a cinematic digital universe crafted with Three.js." />
    <meta property="twitter:image" content="https://manudeep.com/og-image.jpg" />

    <!-- Preconnect to Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="/style.css" />
    
    <!-- JSON-LD Structured Data for Google SEO (Person Schema) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Manudeep",
      "url": "https://manudeep.com/",
      "jobTitle": "Software Engineer",
      "description": "Creative Developer and Software Engineer specializing in immersive 3D web experiences.",
      "sameAs": [
        "https://manudeep.com/"
      ]
    }
    </script>
    
    <!-- Fast CDN Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>
  <body>
    <div id="three-container" aria-hidden="true"></div>

    <main class="ui-layer" itemscope itemtype="https://schema.org/Person">
      <meta itemprop="url" content="https://manudeep.com/" />
      <nav class="glass-nav">
        <div class="creative-logo" itemprop="name">Manudeep</div>
      </nav>

      <section class="hero">
        <div class="hero-content minimal">
          <h1 class="minimal-title" itemprop="alternateName">MANUDEEP</h1>
          <div class="minimal-divider"></div>
        </div>
      </section>
      
      <div class="scroll-indicator">
        <div class="mouse">
          <div class="wheel"></div>
        </div>
        <span>Scroll to Explore</span>
      </div>
    </main>

    <script src="/main.js"></script>
  </body>
</html>
